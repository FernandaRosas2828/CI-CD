name: CI/CD Pipeline Completo

on:
  push:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run K6 test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: load-test.js

  build:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔥 Convertir repo a minúsculas (AQUÍ ESTÁ LA CLAVE)
      - name: Set lowercase repo
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/${{ env.REPO_LC }}:latest .

      - name: Push image
        run: docker push ghcr.io/${{ env.REPO_LC }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ghcr.io/${{ github.repository }}:latest
            docker run -d -p 80:3000 --name my-node-app ghcr.io/${{ github.repository }}:latest
